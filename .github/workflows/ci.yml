---

name: CI & Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"

# ─── Stage 1: pre-commit ─────────────────────────────────────────────────────
# JSON/YAML parsing+linting, Ruff, Mypy, Pytest.
# ─── Stage 2: validate (hacs, hassfest) ──────────────────────────────────────
# HA-specific validators. Both run in parallel after pre-commit.
# ─── Stage 3: release ────────────────────────────────────────────────────────
# Semantic release. Only runs on push to main after all validators pass.

jobs:
  # ── Stage 1 ─────────────────────────────────────────────────────────────────
  pre-commit:
    name: "Stage 1 · JSON+YAML / Ruff / Mypy / Pytest"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Validate JSON files
        run: |
          find . -name "*.json" \
            -not -path "./.venv/*" \
            -not -path "./node_modules/*" \
            | sort | while read -r f; do
              python -m json.tool "$f" > /dev/null && echo "✓ $f" || exit 1
            done

      - name: Lint YAML files
        run: |
          uvx yamllint --config-file .yamllint.yml \
            custom_components/lametric_hass_local/services.yaml \
            .github/

      - name: Lint & Format Check (Ruff)
        run: uv run ruff check . && uv run ruff format --check .

      - name: Type Check (Mypy)
        run: uv run mypy .

      - name: Run Tests (Pytest)
        run: uv run pytest --cov=custom_components/lametric_hass_local --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ── Stage 2 ─────────────────────────────────────────────────────────────────
  hacs:
    name: "Stage 2 · HACS"
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: integration

  hassfest:
    name: "Stage 2 · Hassfest"
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate with hassfest
        uses: "home-assistant/actions/hassfest@master"

  # ── Stage 3 ─────────────────────────────────────────────────────────────────
  release:
    name: "Stage 3 · Semantic Release"
    needs: [hacs, hassfest]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      contents: write
    outputs:
      released: ${{ steps.release.outputs.released || 'false' }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          commit: false
          tag: false
          push: false
          changelog: false
          build: false

      - name: Update manifest.json version
        if: steps.release.outputs.released == 'true'
        run: |
          jq --arg v "${{ steps.release.outputs.version }}" '.version = $v' \
            custom_components/lametric_hass_local/manifest.json > tmp.json
          mv tmp.json custom_components/lametric_hass_local/manifest.json

      - name: Commit, tag & push version bump
        if: steps.release.outputs.released == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml custom_components/lametric_hass_local/manifest.json
          git commit -m "chore(release): ${{ steps.release.outputs.tag }} [skip ci]"
          git tag "${{ steps.release.outputs.tag }}"
          git push origin main --follow-tags
