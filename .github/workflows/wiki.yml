name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Push wiki pages to GitHub Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v5
        with:
          path: wiki/
          token: ${{ secrets.WIKI_TOKEN }}
