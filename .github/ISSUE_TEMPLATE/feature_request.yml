---

name: Feature Request
description: Suggest a new feature or improvement for the LaMetric Local integration.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!
        Please describe your idea as clearly as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: Is your feature request related to a problem? Describe what you're trying to achieve.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative solutions or workarounds?

  - type: input
    id: device_model
    attributes:
      label: Affected device model(s)
      placeholder: "e.g. LaMetric Time, LaMetric SKY, all"
