name: Bug Report
description: Report a bug or unexpected behaviour in the LaMetric Local integration.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        Please fill out the sections below as thoroughly as possible.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2026.4.0"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: "e.g. 1.9.0"
    validations:
      required: true

  - type: input
    id: device_model
    attributes:
      label: LaMetric device model
      placeholder: "e.g. LaMetric Time, LaMetric SKY"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Call service ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Enable debug logging for `custom_components.lametric_hass_local` and paste the output here.
      render: text

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Download and attach the diagnostics file from the integration page (optional but helpful).
